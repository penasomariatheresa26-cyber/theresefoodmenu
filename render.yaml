# Render Blueprint - render.yaml
# This file configures automatic deployment on Render.com

services:
  - type: web
    name: theresse-food-menu
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # You'll set this manually from Aiven
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /api/health
